version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: fee_sys_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fee_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fee_password}
      POSTGRES_DB: ${POSTGRES_DB:-fee_sys}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fee_user} -d ${POSTGRES_DB:-fee_sys}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fee_sys_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fee_sys_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fee_user}:${POSTGRES_PASSWORD:-fee_password}@postgres:5432/${POSTGRES_DB:-fee_sys}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fee_sys_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
