# nginx host config for fee.5176nas.online
# Place this file at: /etc/nginx/sites-available/fee.5176nas.online
# Then: ln -s /etc/nginx/sites-available/fee.5176nas.online /etc/nginx/sites-enabled/
# SSL is managed by: certbot --nginx -d fee.5176nas.online

server {
    listen 80;
    server_name fee.5176nas.online;

    # certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # redirect HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name fee.5176nas.online;

    # SSL certs (filled in by certbot)
    ssl_certificate     /etc/letsencrypt/live/fee.5176nas.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fee.5176nas.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # security headers
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        strict-origin-when-cross-origin;

    client_max_body_size 20m;

    # proxy to Docker web container (nginx serving Vue build + internal /api proxy)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }
}
