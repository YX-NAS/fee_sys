name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/fee_sys

            echo "=== 1. 备份数据库 ==="
            mkdir -p /opt/fee_sys/backups
            BACKUP_FILE="/opt/fee_sys/backups/fee_sys_$(date +%Y%m%d_%H%M%S).sql"
            sudo docker compose exec -T postgres pg_dump -U fee_user fee_sys > "$BACKUP_FILE"
            echo "备份完成: $BACKUP_FILE"
            # 保留最近 10 个备份
            ls -t /opt/fee_sys/backups/fee_sys_*.sql | tail -n +11 | xargs rm -f 2>/dev/null || true

            echo "=== 2. 同步代码 (强制重置) ==="
            sudo git fetch origin
            sudo git clean -fd
            sudo git reset --hard origin/main

            echo "=== 3. 构建容器 ==="
            sudo docker compose build

            echo "=== 4. 启动容器 ==="
            sudo docker compose up -d --remove-orphans

            echo "=== 5. 等待数据库就绪 ==="
            sleep 8

            echo "=== 6. 执行数据库迁移 ==="
            sudo docker compose exec -T api alembic upgrade head

            echo "=== 7. 健康检查 ==="
            sleep 3
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "健康检查通过"
            else
              echo "WARN: 健康检查未通过，请检查日志: docker compose logs api"
            fi

            echo "=== 8. 容器状态 ==="
            sudo docker compose ps

            echo "=== 部署完成 ==="
            echo "访问地址: https://fee.5176nas.online"
